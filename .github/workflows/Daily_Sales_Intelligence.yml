name: Daily Sales Intelligence — CA Law Enforcement
on:
  schedule:
    - cron: '5 6 * * 1-6'  # 2:05 AM ET (UTC-4 EDT), Mon–Sat
    #   Mon  → weekly summary of prior Mon–Fri
    #   Tue–Sat → daily recap of prior day (Sat captures Fri)
  workflow_dispatch:
jobs:
  sales-intelligence:
    runs-on: ubuntu-latest
    steps:
      - name: Run Sales Intelligence Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_API_KEY:   ${{ secrets.HUBSPOT_API_KEY }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          pip install requests --quiet
          python3 - <<'EOF'
          import requests, json, os, re, time, datetime, calendar

          ANTHROPIC_KEY    = os.environ["ANTHROPIC_API_KEY"]
          HUBSPOT_KEY      = os.environ["HUBSPOT_API_KEY"]
          SLACK_TOKEN      = os.environ["SLACK_BOT_TOKEN"]
          DAILY_OB_CHANNEL = "C0AQFHD6Q4F"  # #daily-ob
          HS_HEADERS    = {"Authorization": f"Bearer {HUBSPOT_KEY}", "Content-Type": "application/json"}
          SLACK_HEADERS = {"Authorization": f"Bearer {SLACK_TOKEN}", "Content-Type": "application/json"}
          ANTH_HEADERS  = {
              "Content-Type": "application/json",
              "x-api-key": ANTHROPIC_KEY,
              "anthropic-version": "2023-06-01"
          }

          PORTAL_ID    = "21451281"
          SEQUENCE_ID  = "304238924"  # OB Agent sequence

          # ── AE identity map ───────────────────────────────────────────
          AE_OWNERS = {
              "749290652": "Dillon DeWitt",
              "87460084":  "Will Weis",
              "89993866":  "James Gregory",
          }
          AE_ORDER = ["749290652", "87460084", "89993866"]

          # ── Aircall tag classification ────────────────────────────────
          MEETING_SET_GUID = "d62d6bbe-4f03-4e2d-81fa-faabcc26c819"  # fallback only

          def tag_emoji(tag):
              t = tag.lower()
              if "meeting set" in t or "interested (" in t:  return "📅"
              if t.startswith("connected"):                   return "🟢"
              if "voicemail" in t:                            return "📬"
              if "wrong number" in t:                         return "❌"
              if "not connected" in t:                        return "🔴"
              return "⚪"

          def is_connected_tag(tag):
              return tag.lower().startswith("connected")

          def is_meeting_set_tag(tag):
              return "meeting set" in tag.lower() or "interested (" in tag.lower()

          # ── Date range logic ──────────────────────────────────────────
          now   = datetime.datetime.utcnow()
          today = now.replace(hour=0, minute=0, second=0, microsecond=0)
          is_weekly = (today.weekday() == 0)  # Monday

          if is_weekly:
              week_start = today - datetime.timedelta(days=7)
              week_end   = today - datetime.timedelta(days=2)
              start_ms   = int(calendar.timegm(week_start.timetuple()) * 1000)
              end_ms     = int(calendar.timegm(week_end.timetuple())   * 1000)
              day_label  = (f"Week of {week_start.strftime('%b %d')} – "
                            f"{(week_end - datetime.timedelta(days=1)).strftime('%b %d, %Y')}")
              mode_label = "📊 *Weekly Sales Summary*"
          else:
              start_dt  = today - datetime.timedelta(days=1)
              end_dt    = today
              start_ms  = int(calendar.timegm(start_dt.timetuple()) * 1000)
              end_ms    = int(calendar.timegm(end_dt.timetuple())   * 1000)
              day_label = start_dt.strftime("%A, %b %d")
              mode_label = "📞 *Daily Sales Recap*"

          print(f"📅 Mode: {'Weekly' if is_weekly else 'Daily'} | Period: {day_label}")
          print(f"   start_ms={start_ms} | end_ms={end_ms}")

          # ── Claude helper ─────────────────────────────────────────────
          def claude(prompt, max_tokens=400):
              for attempt in range(3):
                  try:
                      r = requests.post("https://api.anthropic.com/v1/messages",
                          headers=ANTH_HEADERS,
                          json={
                              "model": "claude-sonnet-4-6",
                              "max_tokens": max_tokens,
                              "messages": [{"role": "user", "content": prompt}]
                          }, timeout=60)
                      if r.status_code == 200:
                          return r.json()["content"][0]["text"].strip()
                      elif r.status_code == 429:
                          time.sleep(30)
                  except Exception as e:
                      print(f"  Claude error attempt {attempt+1}: {e}")
                      time.sleep(5)
              return ""

          # ── Parse Aircall data from hs_call_body HTML ─────────────────
          def strip_html(html_str):
              return re.sub(r'\s+', ' ', re.sub(r'<[^>]+>', ' ', html_str)).strip()

          def parse_aircall(body):
              if not body:
                  return {"tags": "", "comments": ""}
              tags_div = re.search(
                  r'id=["\']aircall-tags["\'][^>]*>(.*?)</div>',
                  body, re.DOTALL | re.IGNORECASE
              )
              tags = ""
              if tags_div:
                  plain = strip_html(tags_div.group(1))
                  t = re.search(r'Tags:\s*(.+)', plain, re.IGNORECASE)
                  tags = t.group(1).strip() if t else ""
              comments_div = re.search(
                  r'id=["\']aircall-comments["\'][^>]*>(.*?)</div>',
                  body, re.DOTALL | re.IGNORECASE
              )
              comments = strip_html(comments_div.group(1)) if comments_div else ""
              return {"tags": tags, "comments": comments}

          # ── Fetch HubSpot contact links for meeting-set calls ────────
          def get_meeting_contacts(call_ids):
              if not call_ids:
                  return []
              assoc_resp = requests.post(
                  "https://api.hubapi.com/crm/v3/associations/calls/contacts/batch/read",
                  headers=HS_HEADERS,
                  json={"inputs": [{"id": str(cid)} for cid in call_ids[:100]]}
              ).json()
              contact_map = {}
              for r in assoc_resp.get("results", []):
                  call_id   = str(r.get("from", {}).get("id", ""))
                  tos       = r.get("to", [])
                  if tos and call_id:
                      contact_map[call_id] = str(tos[0].get("id", ""))
              if not contact_map:
                  return []
              unique_cids = list(set(contact_map.values()))
              names_resp  = requests.post(
                  "https://api.hubapi.com/crm/v3/objects/contacts/batch/read",
                  headers=HS_HEADERS,
                  json={"inputs": [{"id": cid} for cid in unique_cids],
                        "properties": ["firstname", "lastname"]}
              ).json()
              id_to_name = {}
              for c in names_resp.get("results", []):
                  props = c.get("properties", {})
                  name  = " ".join(filter(None, [props.get("firstname",""), props.get("lastname","")])).strip()
                  id_to_name[c["id"]] = name or f"Contact {c['id']}"
              seen = set()
              result = []
              for contact_id in contact_map.values():
                  if contact_id not in seen:
                      seen.add(contact_id)
                      name = id_to_name.get(contact_id, f"Contact {contact_id}")
                      url  = f"https://app.hubspot.com/contacts/{PORTAL_ID}/record/0-1/{contact_id}"
                      result.append((name, url))
              return result

          # ══════════════════════════════════════════════════════════════
          # SECTION 1 — CALL INTELLIGENCE
          # ══════════════════════════════════════════════════════════════
          print(f"\n📥 Fetching outbound calls from HubSpot...")
          all_calls = []
          after = None
          while True:
              payload = {
                  "filterGroups": [{"filters": [
                      {"propertyName": "hs_call_direction", "operator": "EQ",  "value": "OUTBOUND"},
                      {"propertyName": "hs_timestamp",      "operator": "GTE", "value": str(start_ms)},
                      {"propertyName": "hs_timestamp",      "operator": "LT",  "value": str(end_ms)},
                  ]}],
                  "properties": [
                      "hs_call_disposition", "hs_call_duration", "hs_call_body",
                      "hubspot_owner_id", "hs_timestamp", "hs_call_status"
                  ],
                  "limit": 200,
              }
              if after:
                  payload["after"] = after
              resp = requests.post(
                  "https://api.hubapi.com/crm/v3/objects/calls/search",
                  headers=HS_HEADERS, json=payload
              ).json()
              results = resp.get("results", [])
              all_calls.extend(results)
              next_after = resp.get("paging", {}).get("next", {}).get("after")
              if not next_after:
                  break
              after = next_after
              time.sleep(0.3)

          print(f"  ✅ {len(all_calls)} outbound calls found")

          # ── Group calls by AE ─────────────────────────────────────────
          ae_calls = {oid: [] for oid in AE_OWNERS}
          for call in all_calls:
              oid = str(call["properties"].get("hubspot_owner_id") or "")
              if oid in ae_calls:
                  ae_calls[oid].append({"_call_id": call["id"], **call["properties"]})

          # ── Compute call metrics ──────────────────────────────────────
          def compute_call_metrics(calls):
              total = len(calls)
              if total == 0:
                  return None
              tag_counts          = {}
              connected_durs      = []
              coaching_notes      = []
              meeting_set         = 0
              meeting_set_call_ids = []

              for c in calls:
                  disp_guid   = c.get("hs_call_disposition") or ""
                  duration_ms = int(c.get("hs_call_duration") or 0)
                  body        = c.get("hs_call_body") or ""

                  aircall = parse_aircall(body)
                  tag     = aircall["tags"].strip() if aircall["tags"] else ""
                  tag_key = tag if tag else "(no tag)"
                  tag_counts[tag_key] = tag_counts.get(tag_key, 0) + 1

                  if is_meeting_set_tag(tag) or disp_guid == MEETING_SET_GUID:
                      meeting_set += 1
                      meeting_set_call_ids.append(c.get("_call_id", ""))

                  if is_connected_tag(tag):
                      if duration_ms > 0:
                          connected_durs.append(duration_ms / 1000)
                      if aircall["comments"]:
                          coaching_notes.append(aircall["comments"])

              connected    = sum(v for k, v in tag_counts.items() if is_connected_tag(k))
              wrong_num    = sum(v for k, v in tag_counts.items() if "wrong number" in k.lower())
              wrong_num_rt = round(wrong_num / total * 100) if total else 0
              avg_dur_sec  = int(sum(connected_durs) / len(connected_durs)) if connected_durs else 0
              tag_sorted   = sorted(tag_counts.items(), key=lambda x: -x[1])

              return {
                  "total":          total,
                  "connected":      connected,
                  "meeting_set":    meeting_set,
                  "connect_rate":   round(connected / total * 100) if total else 0,
                  "meeting_rate":   round(meeting_set / total * 100) if total else 0,
                  "wrong_num_rate": wrong_num_rt,
                  "avg_dur_sec":    avg_dur_sec,
                  "tag_sorted":            tag_sorted,
                  "coaching_notes":        coaching_notes[:10],
                  "meeting_set_call_ids":  [cid for cid in meeting_set_call_ids if cid],
              }

          call_metrics     = {}
          meeting_contacts = {}
          for oid in AE_ORDER:
              name = AE_OWNERS[oid]
              m    = compute_call_metrics(ae_calls[oid])
              call_metrics[oid] = m
              if m:
                  print(f"  {name}: {m['total']} calls | {m['connected']} connected ({m['connect_rate']}%) | {m['meeting_set']} mtg set")
                  if m["meeting_set_call_ids"]:
                      contacts = get_meeting_contacts(m["meeting_set_call_ids"])
                      meeting_contacts[oid] = contacts
                      print(f"    📅 Meeting contacts: {[c[0] for c in contacts]}")
              else:
                  print(f"  {name}: 0 calls")

          # ── Claude call coaching ──────────────────────────────────────
          print(f"\n🧠 Generating call coaching insights...")
          coaching_insights = {}
          for oid in AE_ORDER:
              name = AE_OWNERS[oid]
              m    = call_metrics.get(oid)
              if not m or not m["coaching_notes"]:
                  coaching_insights[oid] = ""
                  continue

              scope = "this week's" if is_weekly else "yesterday's"
              notes_block = "\n".join(f"- {n}" for n in m["coaching_notes"])

              if is_weekly:
                  prompt = (
                      f"You are a sales coach reviewing {scope} connected call notes for {name}, "
                      f"a Rev sales rep selling AI transcription to California law enforcement.\n\n"
                      f"Call notes ({len(m['coaching_notes'])} connected calls, {day_label}):\n"
                      f"{notes_block}\n\n"
                      f"Write 3 coaching observations — each must be exactly ONE sentence.\n"
                      f"1. Top pattern or strength observed\n"
                      f"2. Most common objection or friction point\n"
                      f"3. One specific action item for next week\n\n"
                      f"Format (blank line between each, no extra text):\n"
                      f"✅ **What's Working:** [one sentence]\n\n"
                      f"⚠️ **Friction Point:** [one sentence]\n\n"
                      f"🎯 **Action Item:** [one sentence]\n\n"
                      f"Be specific. Reference actual content from the notes."
                  )
              else:
                  prompt = (
                      f"You are a sales coach reviewing {scope} connected call notes for {name}, "
                      f"a Rev sales rep selling AI transcription to California law enforcement.\n\n"
                      f"Call notes ({len(m['coaching_notes'])} connected calls, {day_label}):\n"
                      f"{notes_block}\n\n"
                      f"Write 2 coaching observations — each must be exactly ONE sentence.\n"
                      f"1. What is working well\n"
                      f"2. One specific area to improve\n\n"
                      f"Format (blank line between them, no extra text):\n"
                      f"✅ **What's Working:** [one sentence]\n\n"
                      f"🔧 **Area to Improve:** [one sentence]\n\n"
                      f"Be specific. Reference actual content from the notes."
                  )

              coaching_insights[oid] = claude(prompt, max_tokens=150 if not is_weekly else 200)
              time.sleep(1)

          # ══════════════════════════════════════════════════════════════
          # SECTION 2 — OB AGENT SEQUENCE (ID: 304238924)
          # Filter by owner + date range, then check hs_sequence_id
          # client-side (hs_sequence_id is not indexable in HS search API)
          # ══════════════════════════════════════════════════════════════
          print(f"\n📧 Fetching OB Agent sequence emails from HubSpot...")
          print(f"   Sequence ID: {SEQUENCE_ID} | Range: {start_ms} – {end_ms}")

          seq_emails_sent    = {oid: 0 for oid in AE_OWNERS}
          seq_emails_bounced = {oid: 0 for oid in AE_OWNERS}
          seq_replies        = {oid: [] for oid in AE_OWNERS}
          seq_meetings       = {oid: [] for oid in AE_OWNERS}
          seq_email_ids_by_owner = {oid: [] for oid in AE_OWNERS}

          seq_after = None
          while True:
              payload = {
                  "filterGroups": [{"filters": [
                      {"propertyName": "hs_timestamp", "operator": "GTE", "value": str(start_ms)},
                      {"propertyName": "hs_timestamp", "operator": "LT",  "value": str(end_ms)},
                  ]}],
                  "properties": [
                      "hs_email_subject", "hs_email_direction", "hs_email_status",
                      "hubspot_owner_id", "hs_timestamp", "hs_sequence_id",
                      "hs_email_reply_count"
                  ],
                  "limit": 200,
              }
              if seq_after:
                  payload["after"] = seq_after
              resp = requests.post(
                  "https://api.hubapi.com/crm/v3/objects/emails/search",
                  headers=HS_HEADERS, json=payload
              ).json()

              if "error" in resp or "status" in resp:
                  print(f"  ⚠️ Sequence query error: {resp}")
                  break

              results = resp.get("results", [])
              print(f"  Page: {len(results)} results | total: {resp.get('total', '?')}")

              for email in results:
                  props     = email["properties"]
                  oid       = str(props.get("hubspot_owner_id") or "")
                  direction = (props.get("hs_email_direction") or "").upper()
                  seq_id    = str(props.get("hs_sequence_id") or "")
                  if oid not in AE_OWNERS or direction == "INCOMING_EMAIL" or seq_id != SEQUENCE_ID:
                      continue
                  status = (props.get("hs_email_status") or "").upper()
                  if status == "BOUNCED":
                      seq_emails_bounced[oid] += 1
                  else:
                      seq_emails_sent[oid] += 1
                  reply_count = int(props.get("hs_email_reply_count") or 0)
                  if reply_count > 0:
                      seq_email_ids_by_owner[oid].append(email["id"])

              next_after = resp.get("paging", {}).get("next", {}).get("after")
              if not next_after:
                  break
              seq_after = next_after
              time.sleep(0.3)

          total_seq_sent    = sum(seq_emails_sent.values())
          total_seq_bounced = sum(seq_emails_bounced.values())
          print(f"  ✅ {total_seq_sent} sent | {total_seq_bounced} bounced")
          for oid in AE_ORDER:
              print(f"    {AE_OWNERS[oid]}: sent={seq_emails_sent[oid]} bounced={seq_emails_bounced[oid]}")

          # ── Fetch contacts linked to replied emails ───────────────────
          def get_contacts_for_emails(email_ids):
              if not email_ids:
                  return []
              assoc_resp = requests.post(
                  "https://api.hubapi.com/crm/v3/associations/emails/contacts/batch/read",
                  headers=HS_HEADERS,
                  json={"inputs": [{"id": str(eid)} for eid in email_ids[:100]]}
              ).json()
              contact_ids = set()
              for r in assoc_resp.get("results", []):
                  for to in r.get("to", []):
                      contact_ids.add(str(to.get("id", "")))
              contact_ids.discard("")
              if not contact_ids:
                  return []
              names_resp = requests.post(
                  "https://api.hubapi.com/crm/v3/objects/contacts/batch/read",
                  headers=HS_HEADERS,
                  json={"inputs": [{"id": cid} for cid in list(contact_ids)],
                        "properties": ["firstname", "lastname"]}
              ).json()
              result = []
              for c in names_resp.get("results", []):
                  props = c.get("properties", {})
                  name  = " ".join(filter(None, [props.get("firstname",""), props.get("lastname","")])).strip()
                  name  = name or f"Contact {c['id']}"
                  url   = f"https://app.hubspot.com/contacts/{PORTAL_ID}/record/0-1/{c['id']}"
                  result.append((name, url))
              return result

          for oid in AE_ORDER:
              if seq_email_ids_by_owner[oid]:
                  seq_replies[oid] = get_contacts_for_emails(seq_email_ids_by_owner[oid])
                  print(f"  {AE_OWNERS[oid]} replies: {[c[0] for c in seq_replies[oid]]}")

          # ── Check for meetings booked via sequence ────────────────────
          all_replied_email_ids = [eid for ids in seq_email_ids_by_owner.values() for eid in ids]
          if all_replied_email_ids:
              mtg_payload = {
                  "filterGroups": [{"filters": [
                      {"propertyName": "hs_timestamp",   "operator": "GTE", "value": str(start_ms)},
                      {"propertyName": "hs_timestamp",   "operator": "LT",  "value": str(end_ms)},
                      {"propertyName": "hs_sequence_id", "operator": "EQ",  "value": SEQUENCE_ID},
                  ]}],
                  "properties": ["hs_email_subject", "hubspot_owner_id", "hs_email_direction"],
                  "limit": 100,
              }
              mtg_resp = requests.post(
                  "https://api.hubapi.com/crm/v3/objects/emails/search",
                  headers=HS_HEADERS, json=mtg_payload
              ).json()
              mtg_email_ids_by_owner = {oid: [] for oid in AE_OWNERS}
              for email in mtg_resp.get("results", []):
                  props     = email["properties"]
                  oid       = str(props.get("hubspot_owner_id") or "")
                  subject   = (props.get("hs_email_subject") or "").lower()
                  direction = (props.get("hs_email_direction") or "").upper()
                  if oid in AE_OWNERS and direction == "INCOMING_EMAIL" and "accepted:" in subject:
                      mtg_email_ids_by_owner[oid].append(email["id"])
              for oid in AE_ORDER:
                  if mtg_email_ids_by_owner[oid]:
                      seq_meetings[oid] = get_contacts_for_emails(mtg_email_ids_by_owner[oid])

          # ══════════════════════════════════════════════════════════════
          # BUILD SLACK MESSAGE
          # ══════════════════════════════════════════════════════════════
          total_calls    = sum((call_metrics[o]["total"]       if call_metrics[o] else 0) for o in AE_ORDER)
          total_conn     = sum((call_metrics[o]["connected"]   if call_metrics[o] else 0) for o in AE_ORDER)
          total_meetings = sum((call_metrics[o]["meeting_set"] if call_metrics[o] else 0) for o in AE_ORDER)
          team_conn_rate = round(total_conn    / total_calls * 100) if total_calls else 0
          team_mtg_rate  = round(total_meetings/ total_calls * 100) if total_calls else 0

          lines = [f"{mode_label} — {day_label}\n"]

          # ── Call section ──────────────────────────────────────────────
          lines.append("📞 *Calls*")
          for oid in AE_ORDER:
              name = AE_OWNERS[oid]
              m    = call_metrics.get(oid)

              if not m:
                  lines.append(f"*{name}* — 0 calls logged\n")
                  continue

              summary_parts = [f"Connect rate: *{m['connect_rate']}%*"]
              if m["meeting_set"]:
                  summary_parts.append(f"📅 {m['meeting_set']} mtg{'s' if m['meeting_set'] != 1 else ''} set")
              if m["avg_dur_sec"]:
                  d = m["avg_dur_sec"]
                  summary_parts.append(f"⏱ Avg connected: {d // 60}m {d % 60}s")
              lines.append(f"*{name}* — {m['total']} calls  |  {'  |  '.join(summary_parts)}")

              for tag, count in m["tag_sorted"]:
                  pct   = round(count / m["total"] * 100)
                  emoji = tag_emoji(tag)
                  lines.append(f"  {emoji} _{tag}_: {count} ({pct}%)")

              contacts = meeting_contacts.get(oid, [])
              if contacts:
                  contact_links = "  ".join(f"<{url}|{cname}>" for cname, url in contacts)
                  lines.append(f"  📅 Meeting set: {contact_links}")

              if m["wrong_num_rate"] >= 20:
                  lines.append(f"  ⚠️ *High wrong-number rate ({m['wrong_num_rate']}%)* — refresh phone data for {name}'s counties")

              insight = coaching_insights.get(oid, "")
              if insight:
                  lines.append(f"\n  _Coaching:_\n")
                  for il in insight.splitlines():
                      if il.strip():
                          lines.append(f"  {il.strip()}")
                      else:
                          lines.append("")
              lines.append("")

          # ── Totals ────────────────────────────────────────────────────
          total_seq_replies  = sum(len(seq_replies[o])  for o in AE_ORDER)
          total_seq_meetings = sum(len(seq_meetings[o]) for o in AE_ORDER)
          total_seq_bounced_all = sum(seq_emails_bounced[o] for o in AE_ORDER)
          total_seq_all      = total_seq_sent + total_seq_bounced_all
          team_bounce_rate   = round(total_seq_bounced_all / total_seq_all * 100) if total_seq_all else 0

          if total_calls:
              lines.append(
                  f"{'📊 *Weekly Totals*' if is_weekly else '📊 *Totals*'}: "
                  f"{total_calls} calls  |  "
                  f"{total_conn} connected ({team_conn_rate}%)  |  "
                  f"{total_meetings} meeting{'s' if total_meetings != 1 else ''} set ({team_mtg_rate}%)"
              )
          else:
              lines.append("_No outbound activity logged for this period._")

          if total_seq_all:
              lines.append(
                  f"{'📧 *Weekly Email Totals*' if is_weekly else '📧 *Email Totals*'}: "
                  f"{total_seq_sent} sent  |  "
                  f"{total_seq_bounced_all} bounced ({team_bounce_rate}%)  |  "
                  f"{total_seq_replies} {'reply' if total_seq_replies == 1 else 'replies'}  |  "
                  f"{total_seq_meetings} meeting{'s' if total_seq_meetings != 1 else ''} scheduled"
              )

          lines.append("")

          # ── Sequence section ──────────────────────────────────────────
          lines.append("📧 *OB Agent Sequence*")
          for oid in AE_ORDER:
              name     = AE_OWNERS[oid]
              sent     = seq_emails_sent[oid]
              bounced  = seq_emails_bounced[oid]
              replies  = seq_replies.get(oid, [])
              meetings = seq_meetings.get(oid, [])

              if sent == 0 and bounced == 0:
                  lines.append(f"*{name}* — 0 emails sent\n")
                  continue

              total_emails = sent + bounced
              bounce_pct   = round(bounced / total_emails * 100) if total_emails else 0
              parts = [f"*{sent}* email{'s' if sent != 1 else ''} sent"]
              if bounced:
                  parts.append(f"{bounced} bounced ({bounce_pct}%)")
              lines.append(f"*{name}* — {' | '.join(parts)}")

              if replies:
                  reply_links = "  ".join(f"<{url}|{cname}>" for cname, url in replies)
                  lines.append(f"  💬 {'Reply' if len(replies) == 1 else 'Replies'}: {reply_links}")
              else:
                  lines.append(f"  💬 0 replies")

              if meetings:
                  mtg_links = "  ".join(f"<{url}|{cname}>" for cname, url in meetings)
                  lines.append(f"  📅 Meeting booked: {mtg_links}")
              else:
                  lines.append(f"  📅 0 meetings scheduled")

              lines.append("")

          lines.append(f"\n_Generated {now.strftime('%Y-%m-%d %H:%M UTC')}_")

          slack_text = "\n".join(lines)

          # ── Post to Slack ─────────────────────────────────────────────
          r = requests.post("https://slack.com/api/chat.postMessage",
              headers=SLACK_HEADERS,
              json={"channel": DAILY_OB_CHANNEL, "text": slack_text})
          result = r.json()
          if result.get("ok"):
              print("\n✅ Posted to #daily-ob")
          else:
              print(f"\n⚠️ Slack post failed: {result.get('error')}")
          print(f"Done. {total_calls} calls | {total_meetings} meetings set | {total_seq_sent} sequence emails.")
          EOF
