name: Daily Call Intelligence — CA Law Enforcement
on:
  schedule:
    - cron: '5 6 * * 1-6'  # 2:05 AM ET (UTC-4 EDT), Mon–Sat
    #   Mon  → weekly summary of prior Mon–Fri
    #   Tue–Sat → daily recap of prior day (Sat captures Fri)
  workflow_dispatch:
jobs:
  call-intelligence:
    runs-on: ubuntu-latest
    steps:
      - name: Run Call Intelligence Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_API_KEY:   ${{ secrets.HUBSPOT_API_KEY }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          pip install requests --quiet
          python3 - <<'EOF'
          import requests, json, os, re, time, datetime

          ANTHROPIC_KEY    = os.environ["ANTHROPIC_API_KEY"]
          HUBSPOT_KEY      = os.environ["HUBSPOT_API_KEY"]
          SLACK_TOKEN      = os.environ["SLACK_BOT_TOKEN"]
          DAILY_OB_CHANNEL = "C0AQFHD6Q4F"  # #daily-ob
          HS_HEADERS    = {"Authorization": f"Bearer {HUBSPOT_KEY}", "Content-Type": "application/json"}
          SLACK_HEADERS = {"Authorization": f"Bearer {SLACK_TOKEN}", "Content-Type": "application/json"}
          ANTH_HEADERS  = {
              "Content-Type": "application/json",
              "x-api-key": ANTHROPIC_KEY,
              "anthropic-version": "2023-06-01"
          }

          # ── AE identity map ───────────────────────────────────────────
          AE_OWNERS = {
              "749290652": "Dillon DeWitt",
              "87460084":  "Will Weis",
              "89993866":  "James Gregory",
          }
          AE_ORDER = ["749290652", "87460084", "89993866"]

          # ── Aircall tag classification ────────────────────────────────
          # Aircall tags (entered by reps) are the source of truth for disposition.
          # HubSpot's hs_call_disposition is unreliable — a call can show "Connected"
          # in HubSpot while the rep tagged it "Not Connected" in Aircall.
          MEETING_SET_GUID = "d62d6bbe-4f03-4e2d-81fa-faabcc26c819"  # fallback only

          def tag_emoji(tag):
              t = tag.lower()
              if "meeting set" in t or "interested (" in t:  return "📅"
              if t.startswith("connected"):                   return "🟢"
              if "voicemail" in t:                            return "📬"
              if "wrong number" in t:                         return "❌"
              if "not connected" in t:                        return "🔴"
              return "⚪"

          def is_connected_tag(tag):
              return tag.lower().startswith("connected")

          def is_meeting_set_tag(tag):
              return "meeting set" in tag.lower() or "interested (" in tag.lower()

          # ── Date range logic ──────────────────────────────────────────
          # Monday  → weekly summary: last Mon 00:00 UTC → last Fri 23:59 UTC
          # Tue–Sat → daily recap: yesterday 00:00 → today 00:00
          now   = datetime.datetime.utcnow()
          today = now.replace(hour=0, minute=0, second=0, microsecond=0)
          is_weekly = (today.weekday() == 0)  # Monday

          if is_weekly:
              # Last Monday = today - 7 days
              week_start = today - datetime.timedelta(days=7)
              # Last Friday = today - 3 days; end at Saturday 00:00 to capture full Friday
              week_end   = today - datetime.timedelta(days=2)  # Saturday 00:00 = end of Friday
              start_ms   = int(week_start.timestamp() * 1000)
              end_ms     = int(week_end.timestamp()   * 1000)
              day_label  = (f"Week of {week_start.strftime('%b %d')} – "
                            f"{(week_end - datetime.timedelta(days=1)).strftime('%b %d, %Y')}")
              mode_label = "📊 *Weekly Call Summary*"
          else:
              start_dt  = today - datetime.timedelta(days=1)
              end_dt    = today
              start_ms  = int(start_dt.timestamp() * 1000)
              end_ms    = int(end_dt.timestamp()   * 1000)
              day_label = start_dt.strftime("%A, %b %d")
              mode_label = "📞 *Daily Call Recap*"

          print(f"📅 Mode: {'Weekly' if is_weekly else 'Daily'} | Period: {day_label}")

          # ── Claude helper ─────────────────────────────────────────────
          def claude(prompt, max_tokens=400):
              for attempt in range(3):
                  try:
                      r = requests.post("https://api.anthropic.com/v1/messages",
                          headers=ANTH_HEADERS,
                          json={
                              "model": "claude-sonnet-4-6",
                              "max_tokens": max_tokens,
                              "messages": [{"role": "user", "content": prompt}]
                          }, timeout=60)
                      if r.status_code == 200:
                          return r.json()["content"][0]["text"].strip()
                      elif r.status_code == 429:
                          time.sleep(30)
                  except Exception as e:
                      print(f"  Claude error attempt {attempt+1}: {e}")
                      time.sleep(5)
              return ""

          # ── Parse Aircall data from hs_call_body HTML ─────────────────
          # HTML structure: <div id="aircall-tags"><br><strong>Tags:</strong> VALUE</div>
          # Must strip HTML tags first — "Tags:" is inside <strong> so a naive
          # regex stopping at "<" captures nothing.
          def strip_html(html_str):
              return re.sub(r'\s+', ' ', re.sub(r'<[^>]+>', ' ', html_str)).strip()

          def parse_aircall(body):
              if not body:
                  return {"tags": "", "comments": ""}
              # Extract aircall-tags div, strip HTML, then find "Tags: VALUE"
              tags_div = re.search(
                  r'id=["\']aircall-tags["\'][^>]*>(.*?)</div>',
                  body, re.DOTALL | re.IGNORECASE
              )
              tags = ""
              if tags_div:
                  plain = strip_html(tags_div.group(1))
                  t = re.search(r'Tags:\s*(.+)', plain, re.IGNORECASE)
                  tags = t.group(1).strip() if t else ""
              # Extract aircall-comments div
              comments_div = re.search(
                  r'id=["\']aircall-comments["\'][^>]*>(.*?)</div>',
                  body, re.DOTALL | re.IGNORECASE
              )
              comments = strip_html(comments_div.group(1)) if comments_div else ""
              return {"tags": tags, "comments": comments}

          # ── Fetch all outbound calls in range (paginated) ─────────────
          print(f"\n📥 Fetching outbound calls from HubSpot...")
          all_calls = []
          after = None
          while True:
              payload = {
                  "filterGroups": [{"filters": [
                      {"propertyName": "hs_call_direction", "operator": "EQ",  "value": "OUTBOUND"},
                      {"propertyName": "hs_timestamp",      "operator": "GTE", "value": str(start_ms)},
                      {"propertyName": "hs_timestamp",      "operator": "LT",  "value": str(end_ms)},
                  ]}],
                  "properties": [
                      "hs_call_disposition", "hs_call_duration", "hs_call_body",
                      "hubspot_owner_id", "hs_timestamp", "hs_call_status"
                  ],
                  "limit": 200,
              }
              if after:
                  payload["after"] = after
              resp = requests.post(
                  "https://api.hubapi.com/crm/v3/objects/calls/search",
                  headers=HS_HEADERS, json=payload
              ).json()
              results = resp.get("results", [])
              all_calls.extend(results)
              next_after = resp.get("paging", {}).get("next", {}).get("after")
              if not next_after:
                  break
              after = next_after
              time.sleep(0.3)

          print(f"  ✅ {len(all_calls)} outbound calls found")

          # ── Group calls by AE ─────────────────────────────────────────
          ae_calls = {oid: [] for oid in AE_OWNERS}
          for call in all_calls:
              oid = str(call["properties"].get("hubspot_owner_id") or "")
              if oid in ae_calls:
                  ae_calls[oid].append(call["properties"])

          # ── Compute metrics — Aircall tags as source of truth ────────
          def compute_metrics(calls):
              total = len(calls)
              if total == 0:
                  return None
              tag_counts     = {}   # raw Aircall tag → count
              connected_durs = []   # seconds, connected calls only
              coaching_notes = []   # comments from connected calls
              meeting_set    = 0

              for c in calls:
                  disp_guid   = c.get("hs_call_disposition") or ""
                  duration_ms = int(c.get("hs_call_duration") or 0)
                  body        = c.get("hs_call_body") or ""

                  aircall = parse_aircall(body)
                  tag     = aircall["tags"].strip() if aircall["tags"] else ""
                  tag_key = tag if tag else "(no tag)"
                  tag_counts[tag_key] = tag_counts.get(tag_key, 0) + 1

                  # Meeting set: Aircall tag OR HubSpot disposition fallback
                  if is_meeting_set_tag(tag) or disp_guid == MEETING_SET_GUID:
                      meeting_set += 1

                  # Connected = Aircall tag starts with "connected"
                  if is_connected_tag(tag):
                      if duration_ms > 0:
                          connected_durs.append(duration_ms / 1000)
                      if aircall["comments"]:
                          coaching_notes.append(aircall["comments"])

              # Connected count = sum of all "connected *" tags
              connected    = sum(v for k, v in tag_counts.items() if is_connected_tag(k))
              wrong_num    = sum(v for k, v in tag_counts.items() if "wrong number" in k.lower())
              wrong_num_rt = round(wrong_num / total * 100) if total else 0
              avg_dur_sec  = int(sum(connected_durs) / len(connected_durs)) if connected_durs else 0

              # Sort tags by count descending for display
              tag_sorted = sorted(tag_counts.items(), key=lambda x: -x[1])

              return {
                  "total":          total,
                  "connected":      connected,
                  "meeting_set":    meeting_set,
                  "connect_rate":   round(connected / total * 100) if total else 0,
                  "meeting_rate":   round(meeting_set / total * 100) if total else 0,
                  "wrong_num_rate": wrong_num_rt,
                  "avg_dur_sec":    avg_dur_sec,
                  "tag_sorted":     tag_sorted,   # [(tag, count), ...] sorted by count
                  "coaching_notes": coaching_notes[:10],
              }

          metrics = {}
          for oid in AE_ORDER:
              name = AE_OWNERS[oid]
              m    = compute_metrics(ae_calls[oid])
              metrics[oid] = m
              if m:
                  print(f"  {name}: {m['total']} calls | {m['connected']} connected ({m['connect_rate']}%) | {m['meeting_set']} mtg set")
              else:
                  print(f"  {name}: 0 calls")

          # ── Claude coaching ───────────────────────────────────────────
          print(f"\n🧠 Generating coaching insights...")
          coaching_insights = {}
          for oid in AE_ORDER:
              name = AE_OWNERS[oid]
              m    = metrics.get(oid)
              if not m or not m["coaching_notes"]:
                  coaching_insights[oid] = ""
                  continue

              scope = "this week's" if is_weekly else "yesterday's"
              notes_block = "\n".join(f"- {n}" for n in m["coaching_notes"])

              if is_weekly:
                  prompt = (
                      f"You are a sales coach reviewing {scope} connected call notes for {name}, "
                      f"a Rev sales rep selling AI transcription to California law enforcement.\n\n"
                      f"Call notes ({len(m['coaching_notes'])} connected calls, {day_label}):\n"
                      f"{notes_block}\n\n"
                      f"Write 3 concise coaching observations for the week:\n"
                      f"1. Top pattern or strength observed\n"
                      f"2. Most common objection or friction point\n"
                      f"3. One specific action item for next week\n\n"
                      f"Format:\n"
                      f"✅ [strength]\n"
                      f"⚠️ [friction]\n"
                      f"🎯 [action item]\n\n"
                      f"Be specific. Reference actual content from the notes."
                  )
              else:
                  prompt = (
                      f"You are a sales coach reviewing {scope} connected call notes for {name}, "
                      f"a Rev sales rep selling AI transcription to California law enforcement.\n\n"
                      f"Call notes ({len(m['coaching_notes'])} connected calls, {day_label}):\n"
                      f"{notes_block}\n\n"
                      f"Write 2 concise coaching observations:\n"
                      f"1. What is working well\n"
                      f"2. One specific area to improve\n\n"
                      f"Format:\n"
                      f"✅ [positive]\n"
                      f"🔧 [improve]\n\n"
                      f"Be specific. Reference actual content from the notes."
                  )

              coaching_insights[oid] = claude(prompt, max_tokens=250 if is_weekly else 200)
              time.sleep(1)

          # ── Build Slack message ───────────────────────────────────────
          total_calls    = sum((metrics[o]["total"]       if metrics[o] else 0) for o in AE_ORDER)
          total_conn     = sum((metrics[o]["connected"]   if metrics[o] else 0) for o in AE_ORDER)
          total_meetings = sum((metrics[o]["meeting_set"] if metrics[o] else 0) for o in AE_ORDER)
          team_conn_rate = round(total_conn    / total_calls * 100) if total_calls else 0
          team_mtg_rate  = round(total_meetings/ total_calls * 100) if total_calls else 0

          lines = [f"{mode_label} — {day_label}\n"]

          for oid in AE_ORDER:
              name = AE_OWNERS[oid]
              m    = metrics.get(oid)

              if not m:
                  lines.append(f"*{name}* — 0 calls logged\n")
                  continue

              # Header line
              summary_parts = [f"Connect rate: *{m['connect_rate']}%*"]
              if m["meeting_set"]:
                  summary_parts.append(f"📅 {m['meeting_set']} mtg{'s' if m['meeting_set'] != 1 else ''} set")
              if m["avg_dur_sec"]:
                  d = m["avg_dur_sec"]
                  summary_parts.append(f"⏱ Avg connected: {d // 60}m {d % 60}s")
              lines.append(f"*{name}* — {m['total']} calls  |  {'  |  '.join(summary_parts)}")

              # Aircall tag breakdown (stacked view — source of truth)
              for tag, count in m["tag_sorted"]:
                  pct   = round(count / m["total"] * 100)
                  emoji = tag_emoji(tag)
                  lines.append(f"  {emoji} _{tag}_: {count} ({pct}%)")

              if m["wrong_num_rate"] >= 20:
                  lines.append(f"  ⚠️ *High wrong-number rate ({m['wrong_num_rate']}%)* — refresh phone data for {name}'s counties")

              insight = coaching_insights.get(oid, "")
              if insight:
                  lines.append(f"\n  _Coaching:_")
                  for il in insight.splitlines():
                      if il.strip():
                          lines.append(f"  {il.strip()}")
              lines.append("")

          # Team totals
          if total_calls:
              lines.append(
                  f"{'📊 *Weekly Totals*' if is_weekly else '📊 *Totals*'}: "
                  f"{total_calls} calls  |  "
                  f"{total_conn} connected ({team_conn_rate}%)  |  "
                  f"{total_meetings} meeting{'s' if total_meetings != 1 else ''} set ({team_mtg_rate}%)"
              )
          else:
              lines.append("_No outbound calls logged for this period._")

          lines.append(f"\n_Generated {now.strftime('%Y-%m-%d %H:%M UTC')}_")

          slack_text = "\n".join(lines)

          # ── Post to Slack ─────────────────────────────────────────────
          r = requests.post("https://slack.com/api/chat.postMessage",
              headers=SLACK_HEADERS,
              json={"channel": DAILY_OB_CHANNEL, "text": slack_text})
          result = r.json()
          if result.get("ok"):
              print("\n✅ Posted to #daily-ob")
          else:
              print(f"\n⚠️ Slack post failed: {result.get('error')}")
          print(f"Done. {total_calls} calls | {total_meetings} meetings set.")
          EOF
