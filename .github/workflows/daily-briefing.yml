name: Daily Revenue Briefing

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 8:00 AM ET (UTC-5), Mon–Fri
  workflow_dispatch:          # Manual trigger from GitHub Actions tab

jobs:
  post-briefings:
    runs-on: ubuntu-latest

    steps:
      - name: Post Daily Pipe Update with Chart
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          pip install matplotlib pytz --quiet
          python3 - <<'EOF'
          import urllib.request, json, os, datetime, pytz, matplotlib
          matplotlib.use('Agg')
          import matplotlib.pyplot as plt

          HUBSPOT_KEY   = os.environ["HUBSPOT_API_KEY"]
          SLACK_TOKEN   = os.environ["SLACK_BOT_TOKEN"]
          SLACK_CHANNEL = "C0APDRMLN1Z"  # #daily-sales
          SLACK_USER    = "U08JJMM2QSW"
          SELLERS       = ["Dillon DeWitt", "Will Weis", "Isabella Simpatico", "James Gregory"]
          PORTAL_ID     = "21451281"

          HS_HEADERS    = {"Authorization": f"Bearer {HUBSPOT_KEY}", "Content-Type": "application/json"}
          SLACK_HEADERS = {"Authorization": f"Bearer {SLACK_TOKEN}", "Content-Type": "application/json"}

          # ── Date range: previous calendar day ET ──────────────────
          et        = pytz.timezone("America/New_York")
          now_et    = datetime.datetime.now(et)
          yesterday = now_et - datetime.timedelta(days=1)
          start_et  = et.localize(datetime.datetime(yesterday.year, yesterday.month, yesterday.day, 0, 0, 0))
          end_et    = et.localize(datetime.datetime(yesterday.year, yesterday.month, yesterday.day, 23, 59, 59))
          start_ms  = int(start_et.timestamp() * 1000)
          end_ms    = int(end_et.timestamp() * 1000)
          date_label = yesterday.strftime("%A, %B %d, %Y")

          # ── HubSpot helpers ────────────────────────────────────────
          def hs_get(path):
              req = urllib.request.Request(f"https://api.hubapi.com{path}", headers=HS_HEADERS)
              with urllib.request.urlopen(req) as r: return json.loads(r.read())

          def hs_post(path, payload):
              req = urllib.request.Request(
                  f"https://api.hubapi.com{path}",
                  data=json.dumps(payload).encode(), headers=HS_HEADERS, method="POST")
              with urllib.request.urlopen(req) as r: return json.loads(r.read())

          # ── Get owners ─────────────────────────────────────────────
          owners = hs_get("/crm/v3/owners").get("results", [])
          owner_map = {f"{o['firstName']} {o['lastName']}": o["id"] for o in owners}
          seller_ids = {name: owner_map.get(name) for name in SELLERS}

          # ── Fetch yesterday's deals ────────────────────────────────
          deals = hs_post("/crm/v3/objects/deals/search", {
              "filterGroups": [{"filters": [
                  {"propertyName": "hs_createdate", "operator": "GTE", "value": str(start_ms)},
                  {"propertyName": "hs_createdate", "operator": "LTE", "value": str(end_ms)},
              ]}],
              "properties": ["dealname", "dealtype", "icp", "amount", "closedate",
                             "dealstage", "hubspot_owner_id", "hs_createdate"],
              "limit": 100
          }).get("results", [])

          # ── Map deals to sellers ───────────────────────────────────
          def fmt_currency(val):
              try: return f"${float(val):,.0f}"
              except: return "$0"

          def fmt_date(iso):
              if not iso: return "—"
              try:
                  d = datetime.datetime.fromisoformat(iso.replace("Z", "+00:00"))
                  return d.strftime("%b %d, %Y")
              except: return iso

          seller_deals = {s: [] for s in SELLERS}
          for deal in deals:
              p = deal.get("properties", {})
              oid = p.get("hubspot_owner_id")
              for name, sid in seller_ids.items():
                  if str(oid) == str(sid):
                      seller_deals[name].append({**p, "hs_object_id": deal["id"]})

          total_deals = sum(len(v) for v in seller_deals.values())
          total_acv   = sum(float(d.get("amount") or 0) for v in seller_deals.values() for d in v)

          # ── Generate bar chart ─────────────────────────────────────
          acv_vals    = [sum(float(d.get("amount") or 0) for d in seller_deals[s]) for s in SELLERS]
          short_names = [s.split()[0] for s in SELLERS]
          max_val     = max(acv_vals) if max(acv_vals) > 0 else 1000

          fig, ax = plt.subplots(figsize=(9, 5))
          fig.patch.set_facecolor("#1a1a2e")
          ax.set_facecolor("#1a1a2e")

          bars = ax.barh(short_names, acv_vals, color="#4f8ef7", height=0.5)
          for bar, val in zip(bars, acv_vals):
              ax.text(bar.get_width() + max_val * 0.01, bar.get_y() + bar.get_height() / 2,
                      fmt_currency(val), va='center', ha='left', color='white', fontsize=11, fontweight='bold')

          ax.set_xlabel("ACV ($)", color="white", fontsize=11)
          ax.tick_params(colors="white", labelsize=11)
          ax.set_xlim(0, max_val * 1.3)
          for spine in ax.spines.values(): spine.set_edgecolor("#333")
          plt.title(
              f"Daily Pipe Update — {date_label}\n{total_deals} new deals created   |   Total ACV: {fmt_currency(total_acv)}",
              color="white", fontsize=12, fontweight="bold", pad=15)
          plt.tight_layout()
          chart_path = "/tmp/daily_pipe_chart.png"
          plt.savefig(chart_path, facecolor="#1a1a2e", dpi=150)
          plt.close()
          print("Chart saved.")

          # ── Build Slack text message ───────────────────────────────
          msg  = f"<@{SLACK_USER}>\n"
          msg += f"*Daily Pipe Update — {date_label}*\n"
          msg += f"*{total_deals} new deal{'s' if total_deals != 1 else ''} created | Total ACV: {fmt_currency(total_acv)}*\n\n"

          for seller in SELLERS:
              sd = seller_deals[seller]
              if not sd:
                  msg += f"*{seller}* — 0 deals\n\n"
              else:
                  acv = sum(float(d.get("amount") or 0) for d in sd)
                  msg += f"*{seller}* — {len(sd)} deal(s) | *ACV: {fmt_currency(acv)}*\n"
                  for d in sd:
                      did   = d.get("hs_object_id", "")
                      name  = d.get("dealname", "Unnamed Deal")
                      amt   = fmt_currency(d.get("amount"))
                      icp   = d.get("icp") or "—"
                      dtype = d.get("dealtype") or "—"
                      close = fmt_date(d.get("closedate"))
                      url   = f"https://app.hubspot.com/contacts/{PORTAL_ID}/record/0-3/{did}"
                      msg  += f"<{url}|{name}>\n{amt} | ICP: {icp} | {dtype} | Close: {close}\n"
                  msg += "\n"

          # ── Post text message first ────────────────────────────────
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=json.dumps({"channel": SLACK_CHANNEL, "text": msg}).encode(),
              headers=SLACK_HEADERS, method="POST")
          with urllib.request.urlopen(req) as r:
              text_result = json.loads(r.read())
              print("Text posted:", text_result.get("ok"))

          # ── Upload chart using new Slack file upload API ───────────
          with open(chart_path, "rb") as f:
              chart_data = f.read()
          file_size = len(chart_data)

          # Step 1: Get upload URL
          upload_url_req = urllib.request.Request(
              f"https://slack.com/api/files.getUploadURLExternal?filename=daily_pipe_chart.png&length={file_size}",
              headers={"Authorization": f"Bearer {SLACK_TOKEN}"}, method="GET")
          with urllib.request.urlopen(upload_url_req) as r:
              upload_url_result = json.loads(r.read())

          if not upload_url_result.get("ok"):
              print(f"⚠️ Could not get upload URL: {upload_url_result.get('error')}")
          else:
              upload_url = upload_url_result["upload_url"]
              file_id    = upload_url_result["file_id"]

              # Step 2: Upload file content
              upload_req = urllib.request.Request(
                  upload_url, data=chart_data,
                  headers={"Content-Type": "image/png"}, method="POST")
              with urllib.request.urlopen(upload_req) as r:
                  r.read()

              # Step 3: Complete upload and share to channel
              complete_payload = json.dumps({
                  "files": [{"id": file_id}],
                  "channel_id": SLACK_CHANNEL,
                  "initial_comment": "📊 ACV by Rep"
              }).encode()
              complete_req = urllib.request.Request(
                  "https://slack.com/api/files.completeUploadExternal",
                  data=complete_payload, headers=SLACK_HEADERS, method="POST")
              with urllib.request.urlopen(complete_req) as r:
                  complete_result = json.loads(r.read())
                  if complete_result.get("ok"):
                      print("✅ Chart uploaded successfully!")
                  else:
                      print(f"⚠️ Chart upload failed: {complete_result.get('error')}")
          EOF

      - name: Post Daily CS Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os, datetime

          ANTHROPIC_KEY = os.environ["ANTHROPIC_API_KEY"]
          SLACK_TOKEN   = os.environ["SLACK_BOT_TOKEN"]
          JEREMY        = "U08JJMM2QSW"
          CHURN_RISK_CHANNEL = "C0A2GPGBPD0"

          # Fetch recent #churn-risk messages
          req = urllib.request.Request(
              f"https://slack.com/api/conversations.history?channel={CHURN_RISK_CHANNEL}&limit=30",
              headers={"Authorization": f"Bearer {SLACK_TOKEN}"}, method="GET")
          with urllib.request.urlopen(req) as r:
              churn_data = json.loads(r.read())

          messages   = churn_data.get("messages", [])
          churn_text = "\n---\n".join([m.get("text", "")[:800] for m in messages if m.get("text")])[:6000]

          # Ask Claude to synthesize
          payload = {
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 1000,
              "messages": [{"role": "user", "content": f"""You are a CS intelligence agent for Rev.com.
          Analyze these recent #churn-risk Slack alerts and produce a concise daily CS brief in Slack markdown format.

          Structure it as:
          1. 🔴 High Priority (risk score 7-10) — list company, score, ACV, owner, one-line insight
          2. 🟡 Watch List (score 5-6) — brief bullets
          3. 📋 This Week's Churn Theme — 1-2 sentences on the dominant pattern

          Keep it under 400 words. Use bullet points. Include HubSpot links where present in the data.
          Do not add a greeting or sign-off.

          #churn-risk data:
          {churn_text}"""}]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json", "x-api-key": ANTHROPIC_KEY,
                       "anthropic-version": "2023-06-01"}, method="POST")
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())

          summary    = result["content"][0]["text"]
          today_str  = datetime.date.today().strftime("%a %b %-d, %Y")
          cs_msg     = f":green_heart: *Daily CS Brief — {today_str}*\n━━━━━━━━━━━━━━━━━━━━━━━\n<@{JEREMY}>\n\n{summary}\n\n_Powered by #churn-risk · Health Monitor & Churn Risk Agents_"

          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=json.dumps({"channel": "C0APJ5L22BY", "text": cs_msg}).encode(),
              headers={"Content-Type": "application/json", "Authorization": f"Bearer {SLACK_TOKEN}"},
              method="POST")
          with urllib.request.urlopen(req) as r:
              print("CS brief posted:", json.loads(r.read()).get("ok"))
          EOF

      - name: Post Leadership Digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os, datetime

          ANTHROPIC_KEY = os.environ["ANTHROPIC_API_KEY"]
          HUBSPOT_KEY   = os.environ["HUBSPOT_API_KEY"]
          SLACK_TOKEN   = os.environ["SLACK_BOT_TOKEN"]
          JEREMY        = "U08JJMM2QSW"

          def hs_post(payload):
              req = urllib.request.Request(
                  "https://api.hubapi.com/crm/v3/objects/deals/search",
                  data=json.dumps(payload).encode(),
                  headers={"Content-Type": "application/json",
                           "Authorization": f"Bearer {HUBSPOT_KEY}"}, method="POST")
              with urllib.request.urlopen(req) as r: return json.loads(r.read())

          today_ts   = int(datetime.datetime.now().timestamp() * 1000)
          open_deals = hs_post({
              "filterGroups": [{"filters": [
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedwon"},
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedlost"}
              ]}], "properties": ["dealname"], "limit": 1})
          total_open = open_deals.get("total", 0)

          overdue = hs_post({
              "filterGroups": [{"filters": [
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedwon"},
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedlost"},
                  {"propertyName": "closedate", "operator": "LTE", "value": str(today_ts)}
              ]}], "properties": ["dealname"], "limit": 1})
          total_overdue = overdue.get("total", 0)

          req = urllib.request.Request(
              "https://slack.com/api/conversations.history?channel=C0A2GPGBPD0&limit=20",
              headers={"Authorization": f"Bearer {SLACK_TOKEN}"}, method="GET")
          with urllib.request.urlopen(req) as r:
              churn_msgs = json.loads(r.read()).get("messages", [])
          churn_snippet = "\n".join([m.get("text","")[:400] for m in churn_msgs[:5]])[:2000]

          payload = {
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 800,
              "messages": [{"role": "user", "content": f"""You are a revenue intelligence agent for Rev.com. Write a leadership digest in Slack markdown.

          Format: Top 5 priorities numbered, each tagged [Sales] or [CS], with a red or yellow circle emoji for urgency.
          Then a 2-line NRR Signal section. Then a Pipeline line.
          Under 350 words total. No greeting or sign-off.

          Data:
          - Total open deals: {total_open}
          - Open deals past close date: {total_overdue}
          - Recent #churn-risk signals: {churn_snippet}"""}]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json", "x-api-key": ANTHROPIC_KEY,
                       "anthropic-version": "2023-06-01"}, method="POST")
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())

          digest    = result["content"][0]["text"]
          today_str = datetime.date.today().strftime("%a %b %-d, %Y")
          msg       = f":rocket: *Leadership Digest — {today_str}*\n━━━━━━━━━━━━━━━━━━━━━━━\n<@{JEREMY}>\n\n{digest}\n\n_Powered by HubSpot + #churn-risk · All agents_"

          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=json.dumps({"channel": "C0APDRPC96X", "text": msg}).encode(),
              headers={"Content-Type": "application/json", "Authorization": f"Bearer {SLACK_TOKEN}"},
              method="POST")
          with urllib.request.urlopen(req) as r:
              print("Leadership digest posted:", json.loads(r.read()).get("ok"))
          EOF
