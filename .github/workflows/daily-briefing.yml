name: Daily Revenue Briefing

on:
  schedule:
    - cron: '0 14 * * *'  # 8:00 AM Mountain Time (UTC-6) every day
  workflow_dispatch:       # Also allows manual trigger from GitHub Actions tab

jobs:
  post-briefings:
    runs-on: ubuntu-latest

    steps:
      - name: Post Daily Sales Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python3 - <<'EOF'
          import urllib.request, urllib.parse, json, os, datetime

          ANTHROPIC_KEY = os.environ["ANTHROPIC_API_KEY"]
          HUBSPOT_KEY = os.environ["HUBSPOT_API_KEY"]
          SLACK_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          JEREMY = "U08JJMM2QSW"

          # --- HubSpot: fetch open deals past close date, no next step ---
          def hs_search(payload):
              req = urllib.request.Request(
                  "https://api.hubapi.com/crm/v3/objects/deals/search",
                  data=json.dumps(payload).encode(),
                  headers={"Content-Type": "application/json", "Authorization": f"Bearer {HUBSPOT_KEY}"},
                  method="POST"
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          today_ts = int(datetime.datetime.now().timestamp() * 1000)
          sixty_days_ts = int((datetime.datetime.now() + datetime.timedelta(days=60)).timestamp() * 1000)

          # Stalled / overdue deals
          overdue = hs_search({
              "filterGroups": [{"filters": [
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedwon"},
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedlost"},
                  {"propertyName": "closedate", "operator": "LTE", "value": str(today_ts)},
                  {"propertyName": "amount", "operator": "GT", "value": "10000"}
              ]}],
              "properties": ["dealname", "amount", "closedate", "hubspot_owner_id", "hs_next_step"],
              "sorts": [{"propertyName": "amount", "direction": "DESCENDING"}],
              "limit": 5
          })

          # Renewals expiring in 60 days
          renewals = hs_search({
              "filterGroups": [{"filters": [
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedwon"},
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedlost"},
                  {"propertyName": "contract_end_date__c", "operator": "LTE", "value": str(sixty_days_ts)},
                  {"propertyName": "renewal_acv_", "operator": "GT", "value": "0"}
              ]}],
              "properties": ["dealname", "amount", "contract_end_date__c", "renewal_acv_"],
              "sorts": [{"propertyName": "renewal_acv_", "direction": "DESCENDING"}],
              "limit": 5
          })

          # Build Sales message
          overdue_lines = ""
          for d in overdue.get("results", []):
              p = d["properties"]
              amt = f"${int(float(p.get('amount') or 0)):,}"
              name = p.get("dealname", "Unknown")[:50]
              close = (p.get("closedate") or "")[:10]
              no_next = "⚠️ No next step" if not p.get("hs_next_step") else ""
              url = f"https://app.hubspot.com/contacts/21451281/record/0-3/{d['id']}"
              overdue_lines += f"• <{url}|{name}> · *{amt}* · Due: {close} {no_next}\n"

          renewal_lines = ""
          for d in renewals.get("results", []):
              p = d["properties"]
              acv = f"${int(float(p.get('renewal_acv_') or p.get('amount') or 0)):,}"
              name = p.get("dealname", "Unknown")[:50]
              end = p.get("contract_end_date__c", "")
              url = f"https://app.hubspot.com/contacts/21451281/record/0-3/{d['id']}"
              renewal_lines += f"• <{url}|{name}> · *{acv} ACV* · Expires: {end}\n"

          today_str = datetime.date.today().strftime("%a %b %-d, %Y")
          sales_msg = f"""
          :bar_chart: *Daily Sales Brief — {today_str}*
          ━━━━━━━━━━━━━━━━━━━━━━━
          <@{JEREMY}>

          *🔴 Overdue Deals — Top by ACV*
          {overdue_lines or "No overdue high-value deals today."}
          *📅 Renewals Expiring in 60 Days*
          {renewal_lines or "No renewals flagged today."}
          _Powered by HubSpot · Pipeline Monitor Agent_
          """.strip()

          # Post to Slack
          def slack_post(channel, text):
              req = urllib.request.Request(
                  "https://slack.com/api/chat.postMessage",
                  data=json.dumps({"channel": channel, "text": text}).encode(),
                  headers={"Content-Type": "application/json", "Authorization": f"Bearer {SLACK_TOKEN}"},
                  method="POST"
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          slack_post("C0APDRMLN1Z", sales_msg)  # #daily-sales
          print("Sales brief posted.")
          EOF

      - name: Post Daily CS Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os, datetime

          ANTHROPIC_KEY = os.environ["ANTHROPIC_API_KEY"]
          SLACK_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          JEREMY = "U08JJMM2QSW"
          CHURN_RISK_CHANNEL = "C0A2GPGBPD0"

          # Fetch recent #churn-risk messages
          req = urllib.request.Request(
              f"https://slack.com/api/conversations.history?channel={CHURN_RISK_CHANNEL}&limit=30",
              headers={"Authorization": f"Bearer {SLACK_TOKEN}"},
              method="GET"
          )
          with urllib.request.urlopen(req) as r:
              churn_data = json.loads(r.read())

          messages = churn_data.get("messages", [])
          churn_text = "\n---\n".join([m.get("text", "")[:800] for m in messages if m.get("text")])[:6000]

          # Ask Claude to synthesize
          payload = {
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 1000,
              "messages": [{
                  "role": "user",
                  "content": f"""You are a CS intelligence agent for Rev.com. 
          Analyze these recent #churn-risk Slack alerts and produce a concise daily CS brief in Slack markdown format.

          Structure it as:
          1. 🔴 High Priority (risk score 7-10) — list company, score, ACV, owner, one-line insight
          2. 🟡 Watch List (score 5-6) — brief bullets
          3. 📋 This Week's Churn Theme — 1-2 sentences on the dominant pattern

          Keep it under 400 words. Use bullet points. Include HubSpot links where present in the data.
          Do not add a greeting or sign-off.

          #churn-risk data:
          {churn_text}"""
              }]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "x-api-key": ANTHROPIC_KEY,
                  "anthropic-version": "2023-06-01"
              },
              method="POST"
          )
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())

          summary = result["content"][0]["text"]
          today_str = datetime.date.today().strftime("%a %b %-d, %Y")

          cs_msg = f":green_heart: *Daily CS Brief — {today_str}*\n━━━━━━━━━━━━━━━━━━━━━━━\n<@{JEREMY}>\n\n{summary}\n\n_Powered by #churn-risk · Health Monitor & Churn Risk Agents_"

          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=json.dumps({"channel": "C0APJ5L22BY", "text": cs_msg}).encode(),
              headers={"Content-Type": "application/json", "Authorization": f"Bearer {SLACK_TOKEN}"},
              method="POST"
          )
          with urllib.request.urlopen(req) as r:
              print("CS brief posted:", json.loads(r.read()).get("ok"))
          EOF

      - name: Post Leadership Digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os, datetime

          ANTHROPIC_KEY = os.environ["ANTHROPIC_API_KEY"]
          HUBSPOT_KEY = os.environ["HUBSPOT_API_KEY"]
          SLACK_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          JEREMY = "U08JJMM2QSW"

          # Fetch pipeline summary from HubSpot
          def hs_search(payload):
              req = urllib.request.Request(
                  "https://api.hubapi.com/crm/v3/objects/deals/search",
                  data=json.dumps(payload).encode(),
                  headers={"Content-Type": "application/json", "Authorization": f"Bearer {HUBSPOT_KEY}"},
                  method="POST"
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          today_ts = int(datetime.datetime.now().timestamp() * 1000)
          open_deals = hs_search({
              "filterGroups": [{"filters": [
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedwon"},
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedlost"}
              ]}],
              "properties": ["dealname", "amount"],
              "limit": 1
          })
          total_open = open_deals.get("total", 0)

          overdue = hs_search({
              "filterGroups": [{"filters": [
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedwon"},
                  {"propertyName": "dealstage", "operator": "NEQ", "value": "closedlost"},
                  {"propertyName": "closedate", "operator": "LTE", "value": str(today_ts)}
              ]}],
              "properties": ["dealname"],
              "limit": 1
          })
          total_overdue = overdue.get("total", 0)

          # Fetch churn risk channel for context
          req = urllib.request.Request(
              "https://slack.com/api/conversations.history?channel=C0A2GPGBPD0&limit=20",
              headers={"Authorization": f"Bearer {SLACK_TOKEN}"},
              method="GET"
          )
          with urllib.request.urlopen(req) as r:
              churn_msgs = json.loads(r.read()).get("messages", [])
          churn_snippet = "\n".join([m.get("text","")[:400] for m in churn_msgs[:5]])[:2000]

          # Ask Claude to write the leadership digest
          payload = {
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 800,
              "messages": [{
                  "role": "user",
                  "content": f"""You are a revenue intelligence agent for Rev.com. Write a leadership digest in Slack markdown.

          Format: Top 5 priorities numbered, each tagged [Sales] or [CS], with a red or yellow circle emoji for urgency.
          Then a 2-line NRR Signal section. Then a Pipeline line.
          Under 350 words total. No greeting or sign-off.

          Data:
          - Total open deals: {total_open}
          - Open deals past close date: {total_overdue}
          - Recent #churn-risk signals: {churn_snippet}"""
              }]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "x-api-key": ANTHROPIC_KEY,
                  "anthropic-version": "2023-06-01"
              },
              method="POST"
          )
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())

          digest = result["content"][0]["text"]
          today_str = datetime.date.today().strftime("%a %b %-d, %Y")

          msg = f":rocket: *Leadership Digest — {today_str}*\n━━━━━━━━━━━━━━━━━━━━━━━\n<@{JEREMY}>\n\n{digest}\n\n_Powered by HubSpot + #churn-risk · All 6 agents_"

          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=json.dumps({"channel": "C0APDRPC96X", "text": msg}).encode(),
              headers={"Content-Type": "application/json", "Authorization": f"Bearer {SLACK_TOKEN}"},
              method="POST"
          )
          with urllib.request.urlopen(req) as r:
              print("Leadership digest posted:", json.loads(r.read()).get("ok"))
          EOF
