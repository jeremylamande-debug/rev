          # ── Email sequence ────────────────────────────────────────
          def clean_email_body(text):
              """Clean email body: strip Subject: lines, remove newlines (HubSpot double-renders
              them alongside <br> tags), normalize all <br> to <br><br> for paragraph spacing,
              and add a trailing <br> for signature breathing room."""
              import re
              if not text:
                  return text
              # Strip any line starting with Subject:
              lines = [l for l in text.splitlines() if not l.strip().lower().startswith("subject:")]
              cleaned = "\n".join(lines).strip()
              # Remove newlines — HubSpot renders \n as extra line breaks on top of <br>
              cleaned = cleaned.replace("\n", "")
              # Normalize: any run of <br> tags becomes exactly <br><br>
              cleaned = re.sub(r'(<br\s*/?>)+', '<br><br>', cleaned, flags=re.IGNORECASE)
              # Strip trailing <br> tags then add exactly one <br> for signature gap
              cleaned = re.sub(r'(<br\s*/?>)+$', '', cleaned.rstrip(), flags=re.IGNORECASE)
              return cleaned + '<br>'

          def gen_email_sequence(contact, ae_name):
