          def score_county(county):
              """
              Score a CA county 0-100 for Rev legal transcription outreach.
              Scoring tiers:
                Tier 0 — Carahsoft/NASPO/cooperative purchasing (+25)  ← removes procurement friction entirely
                Tier 1 — Size: Sheriff + DA budget, bigger = better (+10)
                Tier 2 — Tech readiness: IT spend growth, SaaS adoption (+18)
                Tier 3 — Direct pain: transcription line items, body cam (+30+15 bonus)
                Tier 4 — Buying momentum: budget increases, new hires, ARPA (+5+5+5)
              """
              prompt = f"""You are a B2B sales intelligence analyst. Research {county} County, California
          for signals relevant to selling Rev's legal transcription software (~$15k/yr) to law enforcement.
          Rev partners with Carahsoft for public sector distribution via NASPO ValuePoint and cooperative contracts.
          Search for and answer each question below with a number/boolean and 1-line evidence:
          TIER 0 — Procurement vehicle (most important)
