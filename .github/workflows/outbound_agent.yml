name: Daily Outbound Agent — CA Law Enforcement

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 8:00 AM ET (UTC-5), Mon–Fri v2
  workflow_dispatch:

jobs:
  run-outbound-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Run Outbound Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_API_KEY:   ${{ secrets.HUBSPOT_API_KEY }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          pip install requests pytz --quiet
          python3 - <<'EOF'
          import requests, json, os, time, datetime

          ANTHROPIC_KEY    = os.environ["ANTHROPIC_API_KEY"]
          HUBSPOT_KEY      = os.environ["HUBSPOT_API_KEY"]
          SLACK_TOKEN      = os.environ["SLACK_BOT_TOKEN"]
          SLACK_USER       = "U08JJMM2QSW"
          PORTAL_ID        = "21451281"
          LEADS_PER_AE     = 50

          HS_HEADERS    = {"Authorization": f"Bearer {HUBSPOT_KEY}", "Content-Type": "application/json"}
          SLACK_HEADERS = {"Authorization": f"Bearer {SLACK_TOKEN}", "Content-Type": "application/json"}
          ANTH_HEADERS  = {
              "Content-Type": "application/json",
              "x-api-key": ANTHROPIC_KEY,
              "anthropic-version": "2023-06-01"
          }

          TIER_COUNTIES = [
              "Stanislaus", "Sonoma", "Tulare", "Santa Barbara", "Solano",
              "Monterey", "San Luis Obispo", "Santa Cruz", "Merced", "Butte",
              "Yolo", "El Dorado", "Imperial", "Kings", "Madera",
              "Napa", "Placer", "Shasta", "Nevada", "Sutter"
          ]

          ORG_TYPES = [
              {"type": "Sheriff",           "titles": ["Sheriff", "Chief Deputy Sheriff", "Commander", "Captain"]},
              {"type": "District Attorney", "titles": ["District Attorney", "Chief Deputy DA", "Chief Investigator"]},
              {"type": "Public Defender",   "titles": ["Public Defender", "Chief Deputy Public Defender"]},
              {"type": "Police Department", "titles": ["Chief of Police", "Deputy Chief", "Commander"]},
          ]

          AES = ["Dillon DeWitt", "Will Weis", "James Gregory"]

          MEETING_LINKS = {
              "Dillon DeWitt":  "https://meetings.hubspot.com/dillon-dewitt",
              "Will Weis":      "https://meetings.hubspot.com/will-weis",
              "James Gregory":  "https://meetings.hubspot.com/james-gregory2",
          }

          PERSONA_ANGLES = {
              "Sheriff": {
                  "pain":     "managing body cam footage and interrogation recordings manually",
                  "use_case": "body cam transcription and interrogation documentation",
                  "proof":    "departments using Rev.ai cut documentation time by 60%"
              },
              "District Attorney": {
                  "pain":     "preparing court proceedings and managing evidence documentation",
                  "use_case": "court proceeding transcription and evidence documentation",
                  "proof":    "DA offices using Rev.ai reduce case prep time significantly"
              },
              "Public Defender": {
                  "pain":     "transcribing client interviews and case preparation recordings",
                  "use_case": "client interview transcription and case prep documentation",
                  "proof":    "public defender offices using Rev.ai improve case turnaround"
              },
              "Police Department": {
                  "pain":     "manually processing 911 calls and incident report recordings",
                  "use_case": "911 call transcription and incident report automation",
                  "proof":    "police departments using Rev.ai process calls 3x faster"
              },
          }

          DEPT_MAP = {
              "Sheriff":           "Sheriff Dept",
              "District Attorney": "DA Office",
              "Public Defender":   "Public Defender",
              "Police Department": "Police Dept",
          }

          # ── HubSpot helpers ───────────────────────────────────────
          def hs_get(path):
              r = requests.get(f"https://api.hubapi.com{path}", headers=HS_HEADERS)
              return r.json()

          def hs_post(path, payload):
              r = requests.post(f"https://api.hubapi.com{path}",
                  headers=HS_HEADERS, json=payload)
              return r.json()

          # ── Get owner map ─────────────────────────────────────────
          owners    = hs_get("/crm/v3/owners").get("results", [])
          owner_map = {f"{o['firstName']} {o['lastName']}": o["id"] for o in owners}
          print(f"Owners: {list(owner_map.keys())}")

          # ── State management ──────────────────────────────────────
          STATE_MARKER = "OUTBOUND_AGENT_STATE_V3"

          def load_state():
              try:
                  resp = hs_post("/crm/v3/objects/notes/search", {
                      "filterGroups": [{"filters": [
                          {"propertyName": "hs_note_body",
                           "operator": "CONTAINS_TOKEN",
                           "value": STATE_MARKER}
                      ]}],
                      "properties": ["hs_note_body", "hs_timestamp"],
                      "sorts": [{"propertyName": "hs_timestamp", "direction": "DESCENDING"}],
                      "limit": 1
                  })
                  results = resp.get("results", [])
                  if results:
                      body     = results[0]["properties"]["hs_note_body"]
                      json_str = body.split(STATE_MARKER)[1].strip()
                      return json.loads(json_str)
              except Exception as e:
                  print(f"State load error: {e}")
              return None

          def save_state(state):
              try:
                  hs_post("/crm/v3/objects/notes", {
                      "properties": {
                          "hs_note_body": f"{STATE_MARKER}\n{json.dumps(state)}",
                          "hs_timestamp": str(int(datetime.datetime.now().timestamp() * 1000))
                      }
                  })
              except Exception as e:
                  print(f"State save error: {e}")

          def init_state():
              return {
                  "Dillon DeWitt":  {"county": TIER_COUNTIES[0], "exhausted": []},
                  "Will Weis":      {"county": TIER_COUNTIES[1], "exhausted": []},
                  "James Gregory":  {"county": TIER_COUNTIES[2], "exhausted": []},
              }

          def next_county_for_ae(ae_name, state):
              other_counties = [state[a]["county"] for a in AES if a != ae_name and state[a]["county"]]
              exhausted      = state[ae_name]["exhausted"]
              for county in TIER_COUNTIES:
                  if county not in exhausted and county not in other_counties:
                      return county
              return None

          # ── Always start fresh (clean state) ──────────────────────
          state = load_state()
          if not state:
              print("No state — initializing fresh")
              state = init_state()
          else:
              print(f"Loaded state: {json.dumps(state, indent=2)}")

          # ── Get or create HubSpot list per AE (v3 API) ────────────
          def get_or_create_list(ae_name):
              list_name = f"Outbound — {ae_name}"
              try:
                  resp = requests.get(
                      "https://api.hubapi.com/crm/v3/lists?listType=STATIC&count=100",
                      headers=HS_HEADERS)
                  for lst in resp.json().get("lists", []):
                      if lst.get("name") == list_name:
                          lid = lst.get("listId") or lst.get("id")
                          print(f"Found list: {list_name} → {lid}")
                          return lid
              except Exception as e:
                  print(f"List search error: {e}")
              try:
                  resp = requests.post(
                      "https://api.hubapi.com/crm/v3/lists",
                      headers=HS_HEADERS,
                      json={
                          "name": list_name,
                          "objectTypeId": "0-1",
                          "processingType": "MANUAL"
                      })
                  result = resp.json()
                  lid = result.get("list", {}).get("listId") or result.get("listId")
                  print(f"Created list: {list_name} → {lid}")
                  return lid
              except Exception as e:
                  print(f"List creation error: {e}")
                  return None

          def add_to_list(list_id, contact_id):
              if not list_id or not contact_id: return
              try:
                  resp = requests.put(
                      f"https://api.hubapi.com/crm/v3/lists/{list_id}/memberships/add",
                      headers=HS_HEADERS,
                      json=[int(contact_id)])
                  print(f"    Added to list: {resp.status_code}")
              except Exception as e:
                  print(f"    List add error: {e}")

          list_ids = {ae: get_or_create_list(ae) for ae in AES}
          print(f"HubSpot lists: {list_ids}")

          # ── Claude helper ─────────────────────────────────────────
          def claude(prompt, max_tokens=1000, use_search=False):
              body = {
                  "model": "claude-sonnet-4-20250514",
                  "max_tokens": max_tokens,
                  "messages": [{"role": "user", "content": prompt}]
              }
              if use_search:
                  body["tools"] = [{"type": "web_search_20250305", "name": "web_search"}]
              resp = requests.post("https://api.anthropic.com/v1/messages",
                  headers=ANTH_HEADERS, json=body)
              data = resp.json()
              return "".join(b.get("text","") for b in data.get("content",[]) if b.get("type")=="text").strip()

          # ── Find leads ────────────────────────────────────────────
          def find_leads(county, org_type, titles):
              prompt = f"""Search for real decision makers at the {org_type} in {county} County, California.
          Find people with these titles: {', '.join(titles)}
          Look at official government websites and public records.

          Return a JSON array. Each item must have these exact keys:
          first_name, last_name, title, organization, county, org_type, website, email, phone, address

          Example format:
          [
            {{
              "first_name": "John",
              "last_name": "Smith",
              "title": "Sheriff",
              "organization": "{county} County Sheriff's Office",
              "county": "{county}",
              "org_type": "{org_type}",
              "website": "https://sheriff.gov",
              "email": "",
              "phone": "",
              "address": ""
            }}
          ]

          Return ONLY the JSON array starting with [ and ending with ]. No other text."""

              text = claude(prompt, max_tokens=2000, use_search=True)
              print(f"    Raw response (first 200 chars): {text[:200]}")

              for attempt in [
                  lambda t: json.loads(t.strip()),
                  lambda t: json.loads(t[t.find("["):t.rfind("]")+1]),
                  lambda t: json.loads(t.replace("```json","").replace("```","").strip()[t.replace("```json","").replace("```","").strip().find("["):]),
              ]:
                  try:
                      result = attempt(text)
                      if isinstance(result, list):
                          print(f"    Parsed {len(result)} leads")
                          return result
                  except: pass

              print(f"    ⚠️ Could not parse JSON")
              return []

          # ── Duplicate check ───────────────────────────────────────
          def is_duplicate(email, first_name, last_name):
              if email:
                  r = hs_post("/crm/v3/objects/contacts/search", {
                      "filterGroups": [{"filters": [
                          {"propertyName": "email", "operator": "EQ", "value": email}
                      ]}], "limit": 1})
                  if r.get("total", 0) > 0: return True
              r = hs_post("/crm/v3/objects/contacts/search", {
                  "filterGroups": [{"filters": [
                      {"propertyName": "firstname", "operator": "EQ", "value": first_name},
                      {"propertyName": "lastname",  "operator": "EQ", "value": last_name}
                  ]}], "limit": 1})
              return r.get("total", 0) > 0

          # ── Generate email sequence ───────────────────────────────
          def gen_email_sequence(contact, ae_name):
              meeting_link = MEETING_LINKS[ae_name]
              ae_first     = ae_name.split()[0]
              org_type     = contact.get("org_type", "Sheriff")
              angles       = PERSONA_ANGLES.get(org_type, PERSONA_ANGLES["Sheriff"])
              name         = f"{contact['title']} {contact['last_name']}"
              org          = contact["organization"]
              county       = contact["county"]
              emails       = {}

              emails["email_1"] = claude(f"""Write cold outreach Email 1 of 4 from {ae_first} at Rev.ai to {name} at {org} in {county} County, CA.
          Pain point: {angles['pain']}. Use case: {angles['use_case']}. Meeting link: {meeting_link}
          Rules: Professional but warm, 150-200 words, open with something specific to their role as {contact['title']},
          CTA: Book 15-min demo at {meeting_link}, sign off "{ae_first} from Rev.ai", no pricing.
          Return ONLY the email body.""", max_tokens=400)
              time.sleep(1)

              emails["email_2"] = claude(f"""Write follow-up Email 2 of 4 from {ae_first} at Rev.ai to {name} at {org}.
          No response to first email about {angles['use_case']}.
          Rules: 100-150 words, lead with: {angles['proof']}, ask if priority now,
          CTA: {meeting_link}, sign off "{ae_first} from Rev.ai", no "just following up".
          Return ONLY the email body.""", max_tokens=350)
              time.sleep(1)

              emails["email_3"] = claude(f"""Write value-add Email 3 of 4 from {ae_first} at Rev.ai to {name} at {org}.
          No response to 2 emails about {angles['use_case']}.
          Rules: 100-150 words, lead with insight about AI transcription in law enforcement,
          feel like helpful resource not sales pitch, CTA: "Worth a quick 15-min call?" + {meeting_link},
          sign off "{ae_first} from Rev.ai". Return ONLY the email body.""", max_tokens=350)
              time.sleep(1)

              emails["email_4"] = claude(f"""Write break-up Email 4 of 4 from {ae_first} at Rev.ai to {name} at {org}.
          Final email about {angles['use_case']}.
          Rules: 75-100 words, acknowledge they're busy, leave door open "if timing changes",
          soft CTA: {meeting_link}, sign off "{ae_first} from Rev.ai", warm not passive aggressive.
          Return ONLY the email body.""", max_tokens=250)

              return emails

          def gen_subject(contact, email_num=1):
              org_type = contact.get("org_type", "Sheriff")
              angles   = PERSONA_ANGLES.get(org_type, PERSONA_ANGLES["Sheriff"])
              prompts  = {
                  1: f"Cold email subject for {contact['title']} at {contact['organization']} about Rev.ai {angles['use_case']}. Under 10 words. Professional, curiosity-driving.",
                  2: f"Follow-up subject for {contact['title']} — 2nd email about {angles['use_case']}. Under 8 words. Not 'Following up'.",
                  3: f"Value-add subject for {contact['title']} — 3rd email about {angles['use_case']}. Under 8 words. Insight-driven.",
                  4: f"Break-up subject for {contact['title']} — final email. Under 8 words. Warm closing tone.",
              }
              return claude(f"{prompts[email_num]} Return ONLY the subject line.", max_tokens=50)

          # ── Buying role mapping ───────────────────────────────────
          def get_buying_role(title):
              t = title.lower()
              if any(x in t for x in ["sheriff", "district attorney", "chief of police", "public defender", "chief deputy"]):
                  return "DECISION_MAKER"
              if any(x in t for x in ["commander", "captain", "lieutenant"]):
                  return "INFLUENCER"
              if any(x in t for x in ["investigator", "detective", "analyst"]):
                  return "END_USER"
              if any(x in t for x in ["legal", "compliance"]):
                  return "LEGAL_AND_COMPLIANCE"
              return "BUDGET_HOLDER"

          # ── Create HubSpot contact ────────────────────────────────
          def create_contact(contact, email_body, subject, ae_name):
              buying_role = get_buying_role(contact.get("title", ""))
              dept        = DEPT_MAP.get(contact.get("org_type", ""), contact.get("org_type", ""))

              props = {
                  "firstname":        contact["first_name"],
                  "lastname":         contact["last_name"],
                  "jobtitle":         contact["title"],
                  "company":          contact["organization"],
                  "state":            "California",
                  "city":             f"{contact['county']} County",
                  "hs_lead_status":   "NEW",
                  "leadsource":       "OTHER",  # Safe fallback
              }
              if owner_map.get(ae_name):  props["hubspot_owner_id"] = owner_map[ae_name]
              if contact.get("email"):    props["email"]   = contact["email"]
              if contact.get("phone"):    props["phone"]   = contact["phone"]
              if contact.get("website"):  props["website"] = contact["website"]

              resp = hs_post("/crm/v3/objects/contacts", {"properties": props})
              contact_id = resp.get("id")
              print(f"    Contact API response: {json.dumps(resp)[:300]}")
              if not contact_id:
                  print(f"    ❌ Contact creation failed: {resp}")
                  return None

              # Save all 4 emails as note
              note = (
                  f"OUTBOUND EMAIL\nSubject: {subject}\n"
                  f"County: {contact.get('county','')}\nDept: {dept}\n"
                  f"Buying Role: {buying_role}\nLead Source: Claude\n\n"
                  f"{email_body}"
              )
              hs_post("/crm/v3/objects/notes", {
                  "properties": {
                      "hs_note_body": note,
                      "hs_timestamp": str(int(datetime.datetime.now().timestamp() * 1000))
                  },
                  "associations": [{"to": {"id": contact_id},
                      "types": [{"associationCategory": "HUBSPOT_DEFINED", "associationTypeId": 202}]}]
              })
              return contact_id

          # ── Main loop ─────────────────────────────────────────────
          today_str = datetime.date.today().strftime("%A, %B %d, %Y")
          results   = {}

          for ae_name in AES:
              county    = state[ae_name]["county"]
              added     = []
              skipped   = 0
              found_any = False

              print(f"\n{'='*50}")
              print(f"👤 {ae_name} → 📍 {county} County")

              for org in ORG_TYPES:
                  if len(added) >= LEADS_PER_AE: break
                  print(f"  Searching {org['type']}...")
                  try:
                      leads = find_leads(county, org["type"], org["titles"])
                      if leads:
                          found_any = True
                          print(f"    Found {len(leads)} leads")
                      for lead in leads:
                          if len(added) >= LEADS_PER_AE: break
                          fn = lead.get("first_name","")
                          ln = lead.get("last_name","")
                          if not fn or not ln: continue
                          if is_duplicate(lead.get("email",""), fn, ln):
                              skipped += 1
                              print(f"    ↩ Duplicate: {fn} {ln}")
                              continue
                          emails   = gen_email_sequence(lead, ae_name)
                          subject1 = gen_subject(lead, 1)
                          subject2 = gen_subject(lead, 2)
                          subject3 = gen_subject(lead, 3)
                          subject4 = gen_subject(lead, 4)
                          email_body = (
                              f"━━━ EMAIL 1 — Day 1 (Cold Intro) ━━━\n"
                              f"Subject: {subject1}\n\n{emails['email_1']}\n\n"
                              f"━━━ EMAIL 2 — Day 3 (Follow Up) ━━━\n"
                              f"Subject: {subject2}\n\n{emails['email_2']}\n\n"
                              f"━━━ EMAIL 3 — Day 7 (Value Add) ━━━\n"
                              f"Subject: {subject3}\n\n{emails['email_3']}\n\n"
                              f"━━━ EMAIL 4 — Day 14 (Break Up) ━━━\n"
                              f"Subject: {subject4}\n\n{emails['email_4']}"
                          )
                          contact_id = create_contact(lead, email_body, subject1, ae_name)
                          if contact_id:
                              add_to_list(list_ids[ae_name], contact_id)
                              added.append({
                                  "name":    f"{fn} {ln}",
                                  "title":   lead.get("title",""),
                                  "org":     lead.get("organization",""),
                                  "id":      contact_id,
                                  "subject": subject1
                              })
                              print(f"    ✅ Added: {fn} {ln} — {lead.get('title')}")
                          time.sleep(1)
                  except Exception as e:
                      print(f"    Error: {e}")
                  time.sleep(2)

              # County exhaustion logic
              print(f"  Summary: {len(added)} added, {skipped} skipped, found_any={found_any}")
              if not found_any:
                  print(f"  ℹ️ No leads parsed — keeping {county} for next run")
              elif found_any and len(added) == 0 and skipped > 5:
                  print(f"  ⚠️ {county} exhausted — moving on")
                  state[ae_name]["exhausted"].append(county)
                  next_county = next_county_for_ae(ae_name, state)
                  state[ae_name]["county"] = next_county or None
                  if next_county:
                      print(f"  ➡️ Next county: {next_county}")

              results[ae_name] = {"county": county, "added": added, "skipped": skipped}

          # ── Save state ────────────────────────────────────────────
          save_state(state)
          print(f"\nState saved: {json.dumps(state, indent=2)}")

          # ── Slack summary ─────────────────────────────────────────
          total_added = sum(len(r["added"]) for r in results.values())
          total_skip  = sum(r["skipped"]    for r in results.values())

          msg  = f"<@{SLACK_USER}>\n"
          msg += f"*🎯 Daily Outbound Agent — {today_str}*\n"
          msg += f"*{total_added} new leads added | {total_skip} duplicates skipped*\n\n"

          for ae_name, data in results.items():
              county   = data["county"]
              added    = data["added"]
              list_id  = list_ids[ae_name]
              next_c   = state[ae_name].get("county","")
              next_str = f" → moving to *{next_c}* tomorrow" if next_c and next_c != county else ""
              list_url = f"https://app.hubspot.com/contacts/{PORTAL_ID}/lists/{list_id}" if list_id else ""

              msg += f"*👤 {ae_name}* — 📍 {county} County{next_str}"
              msg += f" | <{list_url}|View Segment>\n" if list_url else "\n"
              msg += f"*{len(added)} leads added*\n"
              for c in added:
                  hs_url = f"https://app.hubspot.com/contacts/{PORTAL_ID}/record/0-1/{c['id']}"
                  msg += f"  • <{hs_url}|{c['name']}> — {c['title']} @ {c['org']}\n"
                  msg += f"    _{c['subject']}_\n"
              if not added:
                  msg += "  No new leads added today\n"
              msg += "\n"

          msg += f"_Powered by Claude · CA Law Enforcement Outbound Agent v4_"

          dm = requests.post("https://slack.com/api/conversations.open",
              headers=SLACK_HEADERS, json={"users": SLACK_USER})
          dm_ch = dm.json().get("channel", {}).get("id", "D08JJMN2L66")
          requests.post("https://slack.com/api/chat.postMessage",
              headers=SLACK_HEADERS, json={"channel": dm_ch, "text": msg})

          print(f"\n✅ Done! {total_added} leads added today.")
          EOF
