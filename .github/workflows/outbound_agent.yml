                      if s.get("snippet"):
                          snippet_line1 = s["snippet"].split("\n")[0]
                          score_msg += f"    _{snippet_line1}_\n"
                  requests.post("https://slack.com/api/chat.postMessage",
                      headers=SLACK_HEADERS, json={"channel": DAILY_OB_CHANNEL, "text": score_msg})
              else:
                  print("📊 County scores refreshed — Slack post skipped (Monday only)")
          else:
              print(f"✅ Using cached county scores ({len(county_scores)} counties)")
          # Re-sort each AE's county list by score (highest first), preserving already-exhausted order
          for ae in AES:
              not_started  = [c for c in AE_COUNTIES[ae]
                               if c not in state[ae].get("exhausted", [])
                               and c != state[ae].get("county")]
              already_done = state[ae].get("exhausted", [])
              current      = state[ae].get("county")
              sorted_next  = sort_counties_by_score(not_started, county_scores)
              AE_COUNTIES[ae] = already_done + ([current] if current else []) + sorted_next
              print(f"  {ae} county order: {AE_COUNTIES[ae]}")
          # ── Find leads ────────────────────────────────────────────
