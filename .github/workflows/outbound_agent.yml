          T3b. If yes, roughly how much is budgeted for transcription? (<$5k=+0, $5-20k=+8, >$20k=+15 bonus)
          T3c. Does {county} County Sheriff or Police have a body-worn camera (BWC) / body cam program? (yes=15, no=0)
          TIER 4 — Buying momentum
          T4a. Did {county} County law enforcement budget increase >5% YoY most recently? (yes=5, no=0)
          T4b. Any new Data Specialist, Analyst, or Investigator hires in Sheriff/DA/Courts in last 12 months? (yes=5, no=0)
          T4c. Any ARPA or federal tech grants active in {county} County for public safety? (yes=5, no=0)
          Return a JSON object with this exact structure:
          {{
            "county": "{county}",
            "score": <total 0-100>,
            "tier0_carahsoft": <true/false>,
            "tier1_sheriff_budget_m": <float millions>,
            "tier2_it_pct": <float>,
            "tier2_it_growing": <true/false>,
            "tier3_transcription_line": <true/false>,
            "tier3_transcription_amt_k": <float thousands, 0 if none>,
            "tier3_body_cam": <true/false>,
            "tier4_budget_increase": <true/false>,
            "tier4_new_hire": <true/false>,
            "tier4_arpa": <true/false>,
            "evidence": "<2-3 sentence summary of top signals found>",
            "snippet": "<EXACTLY 2 lines max. Line 1: the strongest signal (e.g. 'Saw {county} County DA budgeted $8k for transcription services this year — that tells us you\\'re already solving this manually.'). Line 2: the Carahsoft/procurement angle if applicable OR the body cam angle (e.g. 'You\\'re also on NASPO so there\\'s no procurement cycle to worry about.'). No third line. Keep it conversational, not corporate.>"
          }}
