                          county_scores[county] = {"score": 0, "evidence": str(e), "snippet": ""}
              save_county_scores(county_scores)
              # Post score leaderboard to Slack — Mondays only (weekly update)
              if datetime.datetime.today().weekday() == 0:  # 0 = Monday
                  week_of   = datetime.datetime.today().strftime("%B %d, %Y")
