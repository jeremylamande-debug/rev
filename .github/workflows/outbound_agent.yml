          def sort_counties_by_score(county_list, scores):
              """Sort a county list by score descending; unscored counties go to the end."""
              return sorted(county_list, key=lambda c: scores.get(c, {}).get("score", 0), reverse=True)
          # ── Claude helper ─────────────────────────────────────────
          def claude(prompt, max_tokens=1000, use_search=False):
              body = {
                  "model": "claude-sonnet-4-6",
                  "max_tokens": max_tokens,
                  "messages": [{"role": "user", "content": prompt}]
              }
              if use_search:
                  body["tools"] = [{"type": "web_search_20250305", "name": "web_search"}]
              resp = requests.post("https://api.anthropic.com/v1/messages", headers=ANTH_HEADERS, json=body)
              data = resp.json()
              return "".join(b.get("text", "") for b in data.get("content", []) if b.get("type") == "text").strip()
