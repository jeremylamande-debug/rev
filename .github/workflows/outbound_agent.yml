          T1b. What is the {county} County District Attorney annual budget? (>$15M=10pts in context, note for reference)
          TIER 2 — Tech readiness
          T2a. What % of {county} County's total budget goes to IT/technology? (>3%=8, 2-3%=5, <2%=2)
          T2b. Is {county} County IT budget growing YoY? (yes=5, flat/declining=0)
          T2c. Does {county} County have active SaaS or software subscription purchases across departments? (yes=5, no=0)
